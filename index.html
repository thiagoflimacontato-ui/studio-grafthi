
<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="A Gráfica Online do Pequeno Empreendedor. Tags, adesivos, sacolas e lacres personalizados para valorizar sua marca." />
    <meta name="theme-color" content="#0f172a" />
    <base href="/" />
    <title>Studio Grafthi</title>
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="https://picsum.photos/192/192">

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              navy: {
                800: 'color-mix(in srgb, var(--color-primary), white 10%)',
                900: 'var(--color-primary)',
                950: 'color-mix(in srgb, var(--color-primary), black 20%)', 
              },
              orange: {
                500: 'var(--color-secondary)',
                600: 'color-mix(in srgb, var(--color-secondary), black 10%)',
              }
            },
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
            }
          }
        }
      }
    </script>
    <style>
      :root {
        --color-primary: #0f172a;
        --color-secondary: #f97316;
      }
      body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
      /* Custom scrollbar for better UI */
      ::-webkit-scrollbar { width: 8px; }
      ::-webkit-scrollbar-track { background: #f1f1f1; }
      ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
      ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

      /* Scrollbar Hide Utility */
      .scrollbar-hide::-webkit-scrollbar { display: none; }
      .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }

      /* Elegant horizontal scrollbar for categories */
      .category-scrollbar::-webkit-scrollbar { height: 6px; display: block !important; }
      .category-scrollbar::-webkit-scrollbar-track { background: #f1f5f9; border-radius: 10px; }
      .category-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
      .category-scrollbar::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

      /* Fade effect for horizontal scrolling - subtle visual cue */
      @media (max-width: 768px) {
        .scroll-container-wrapper {
          position: relative;
          display: block;
          width: 100%;
        }
        .scroll-container-wrapper::after {
          content: '';
          position: absolute;
          top: 0;
          right: 0;
          height: calc(100% - 6px); /* Leave space for scrollbar */
          width: 30px;
          background: linear-gradient(to right, transparent, rgba(248, 250, 252, 0.9));
          pointer-events: none;
          z-index: 5;
        }
      }

      /* 
         SMART PRINT STYLES 
         Allows printing the Dashboard Leads/Orders cleanly without UI clutter.
      */
      @media print {
        /* Hide non-essential UI elements during print */
        header, 
        footer, 
        button, 
        nav, 
        .no-print, 
        input,
        select,
        /* Hide specific dashboard elements like the Tabs and Filters */
        app-dashboard > div > div > div.flex.overflow-x-auto, 
        app-dashboard .flex-col.md\:flex-row.justify-between,
        /* Hide the Action column in tables */
        th:last-child, 
        td:last-child {
          display: none !important;
        }

        /* Reset Layout for A4 Paper */
        body, main, div {
          background-color: white !important;
          color: black !important;
          margin: 0 !important;
          padding: 0 !important;
          overflow: visible !important;
          box-shadow: none !important;
          border: none !important;
          width: 100% !important;
        }

        /* Ensure tables print nicely */
        table {
          width: 100% !important;
          border-collapse: collapse !important;
        }
        th, td {
          border: 1px solid #ddd !important;
          padding: 8px !important;
        }

        /* Expand container */
        .container {
          max-width: none !important;
          padding: 0 !important;
        }

        /* Add a print header */
        app-dashboard::before {
          content: "Relatório Studio Grafthi - " attr(data-date);
          display: block;
          text-align: center;
          font-size: 20pt;
          font-weight: bold;
          margin-bottom: 20px;
        }
      }
    </style>

    "@angular/forms": "https://esm.sh/@angular/forms@^21.1.3?external=rxjs",
    "@angular/core/rxjs-interop": "https://esm.sh/@angular/core@^21.1.3/rxjs-interop?external=rxjs",
    "@angular/core": "https://esm.sh/@angular/core@^21.1.3?external=rxjs",
    "@angular/compiler": "https://esm.sh/@angular/compiler@^21.1.3?external=rxjs",
    "@angular/platform-browser": "https://esm.sh/@angular/platform-browser@^21.1.3?external=rxjs",
    "@angular/router": "https://esm.sh/@angular/router@^21.1.3?external=rxjs",
    "@angular/common": "https://esm.sh/@angular/common@^21.1.3?external=rxjs",
    "rxjs/": "https://esm.sh/rxjs@^7.8.2/",
    "@angular/core/": "https://esm.sh/@angular/core@^21.1.5/"
  }
}
</script>
</head>
